<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h2>Students with Risk > 40%</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Attendance</th>
    <th>Marks</th>
    <th>Assignments</th>
    <th>Risk (%)</th>
    <th>Reasons</th>
</tr>

{% for s in students %}
<tr>
    <td>{{ s.student_id | int }}</td>
    <td>{{ s.attendance }}</td>
    <td>{{ s.marks }}</td>
    <td>{{ s.assignments }}</td>
    <td>{{ "%.2f"|format(s.risk * 100) }}</td>
    <td>{{ s.reasons }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
